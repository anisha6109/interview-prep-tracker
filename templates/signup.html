{% extends 'base.html' %}
{% block noauth_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-4x text-success mb-3"></i>
                    <h3 class="card-title fw-bold">Create Account</h3>
                    <p class="text-muted">Join the best placement tracker today.</p>
                </div>
                <form method="POST" action="{{ url_for('signup') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email address</label>
                        <input type="email" class="form-control" name="email" required placeholder="name@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="********">
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm">Sign Up</button>
                    <div class="text-center mt-4">
                        <p class="text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-success fw-semibold text-decoration-none">Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
