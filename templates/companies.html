{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="fas fa-building text-primary me-2"></i>Company Tracker</h2>
    <button class="btn btn-primary fw-bold rounded-pill shadow-sm" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="fas fa-plus me-2"></i>Add Company
    </button>
</div>

<div class="row g-4">
    {% for comp in companies %}
    <div class="col-md-4">
        <div class="glass-card h-100 p-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="card-title fw-bold text-primary">{{ comp.company_name }}</h5>
                    <a href="{{ url_for('delete_company', id=comp.id) }}" class="text-danger" onclick="return confirm('Delete this company?')"><i class="fas fa-trash"></i></a>
                </div>
                <h6 class="card-subtitle mb-3 text-muted">Status: 
                    <span class="badge {% if comp.status == 'Selected' %}bg-success{% elif comp.status == 'Rejected' %}bg-danger{% else %}bg-warning text-dark{% endif %}">
                        {{ comp.status }}
                    </span>
                </h6>
                <p class="card-text small text-muted">{{ comp.notes }}</p>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <h5 class="text-muted">No companies tracked yet. Click 'Add Company'.</h5>
    </div>
    {% endfor %}
</div>

<div class="modal fade" id="addModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <form action="{{ url_for('companies') }}" method="POST">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Add Company</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Company Name</label>
                        <input type="text" name="company_name" class="form-control" required placeholder="Google, Microsoft...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select name="status" class="form-select">
                            <option value="Preparing">Preparing</option>
                            <option value="Applied">Applied</option>
                            <option value="Interview">Interview</option>
                            <option value="Selected">Selected</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Notes</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="Any special requirements, links, etc."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary fw-bold shadow-sm px-4">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
